# Static UI from client/dist + Netlify Function at /.netlify/functions/api
# Browser calls /api/news → rewrite → function (?apiPath=news + original query).

[build]
  command = "npm install && npm run install:all && npm run build --prefix client"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Scheduled daily digest — runs at 08:00 UTC every day
[functions."daily-digest"]
  schedule = "0 8 * * *"

# Same-origin API — must be before SPA fallback
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api?apiPath=:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
